<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月全食实时模拟 · 2026-03-03</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03030e;--cyan:#00f3ff;
  --cyan-glow:0 0 12px rgba(0,243,255,.55),0 0 28px rgba(0,243,255,.2);
  --red:#ff3a1a;--red-glow:0 0 16px rgba(255,58,26,.7),0 0 40px rgba(255,58,26,.3);
  --gold:#ffb830;--gold-glow:0 0 10px rgba(255,184,48,.7);
  --glass-bg:rgba(4,8,24,.72);--glass-border:rgba(0,243,255,.18);
  --font-hud:'Orbitron',monospace;--font-data:'Share Tech Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:var(--cyan);
  font-family:var(--font-data);overflow:hidden;cursor:crosshair;user-select:none}
#cvs-bg,#cvs-moon{position:fixed;inset:0}
#cvs-bg{z-index:0}#cvs-moon{z-index:2;pointer-events:none}
#scanlines{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px)}
#vignette{position:fixed;inset:0;z-index:4;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 35%,rgba(0,0,0,.82)100%)}
#eclipse-rim{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;
  box-shadow:inset 0 0 120px rgba(200,30,0,.18),inset 0 0 40px rgba(200,30,0,.08);
  transition:opacity 3s ease}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none}
.corner{position:fixed;width:48px;height:48px;z-index:12;pointer-events:none;opacity:.45}
.corner.tl{top:12px;left:12px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.corner.tr{top:12px;right:12px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.corner.bl{bottom:12px;left:12px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan)}
.corner.br{bottom:12px;right:12px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan)}
.panel{position:absolute;background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:3px;padding:14px 18px;pointer-events:auto}
.panel::before{content:'';position:absolute;top:-1px;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5}
.panel::after{content:'';position:absolute;bottom:-1px;right:-1px;
  width:6px;height:6px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);opacity:.6}
.p-tl{top:24px;left:24px}.p-tr{top:24px;right:24px;text-align:right}.p-br{bottom:118px;right:24px;max-width:330px}
.lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(0,243,255,.4);margin-bottom:3px}
.val-xl{font-family:var(--font-hud);font-size:26px;font-weight:700;letter-spacing:4px;
  color:var(--cyan);text-shadow:var(--cyan-glow);line-height:1}
.val-md{font-family:var(--font-hud);font-size:12px;font-weight:400;letter-spacing:2px;color:var(--cyan)}
#phase-label{font-family:var(--font-hud);font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--gold);text-shadow:var(--gold-glow);margin-top:5px;text-transform:uppercase;
  transition:color .5s,text-shadow .5s}
.tel-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;
  gap:20px;border-bottom:1px solid rgba(0,243,255,.04)}
.tel-row:last-child{border-bottom:none}
.tel-k{font-size:8px;letter-spacing:1.5px;color:rgba(0,243,255,.35);text-transform:uppercase}
.tel-v{font-family:var(--font-data);font-size:10px;color:var(--cyan)}
.sched-title{font-family:var(--font-hud);font-size:9px;letter-spacing:3px;color:var(--cyan);
  text-transform:uppercase;margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--glass-border)}
.si{display:grid;grid-template-columns:1fr auto;gap:2px 12px;padding:5px 2px;
  border-bottom:1px solid rgba(0,243,255,.05);transition:background .3s}
.si:last-child{border-bottom:none}
.s-n{font-family:var(--font-hud);font-size:9px;letter-spacing:1.5px;font-weight:700;
  color:rgba(0,243,255,.55);transition:color .3s,text-shadow .3s}
.s-t{font-family:var(--font-data);font-size:10px;color:rgba(0,243,255,.3);text-align:right;transition:color .3s}
.s-d{font-size:8px;color:rgba(0,243,255,.28);letter-spacing:.5px;line-height:1.4;grid-column:1/-1;margin-top:-1px}
.si.past .s-n,.si.past .s-t,.si.past .s-d{color:rgba(0,243,255,.16)!important}
.si.active{background:rgba(255,184,48,.06);border-radius:3px;padding:5px 5px;margin:0 -5px}
.si.active .s-n{color:var(--gold);text-shadow:var(--gold-glow)}
.si.active .s-t{color:var(--gold)}.si.active .s-d{color:rgba(255,184,48,.55)}
.si.tot.active .s-n{color:var(--red);text-shadow:var(--red-glow)}.si.tot.active .s-t{color:var(--red)}
#tl-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:15;
  pointer-events:auto;width:min(800px,calc(100vw - 48px))}
#tl-panel{background:var(--glass-bg);border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:3px;padding:12px 18px 10px}
#tl-cvs{display:block;width:100%;height:72px}
#demo-row{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.dbtn{font-family:var(--font-data);font-size:9px;letter-spacing:1.5px;color:rgba(0,243,255,.6);
  background:rgba(0,243,255,.04);border:1px solid rgba(0,243,255,.15);border-radius:2px;
  padding:4px 10px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.dbtn:hover{background:rgba(0,243,255,.12);color:#fff;box-shadow:var(--cyan-glow)}
.dbtn.on{background:rgba(0,243,255,.16);box-shadow:var(--cyan-glow);color:#fff}
.dbtn.live{color:var(--gold);border-color:rgba(255,184,48,.3)}
.dbtn.live:hover{background:rgba(255,184,48,.1);box-shadow:var(--gold-glow)}
.dbtn.live.on{background:rgba(255,184,48,.15);box-shadow:var(--gold-glow);color:#fff}
#tot-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;
  pointer-events:none;font-family:var(--font-hud);font-size:12px;letter-spacing:6px;
  color:var(--red);text-shadow:var(--red-glow);text-align:center;opacity:0;transition:opacity 1.5s}
#tot-badge.show{opacity:1;animation:redpulse 2.5s ease-in-out infinite}
@keyframes redpulse{0%,100%{text-shadow:var(--red-glow)}50%{text-shadow:0 0 30px rgba(255,58,26,1),0 0 80px rgba(255,58,26,.5)}}
</style>
</head>
<body>
<canvas id="cvs-bg"></canvas>
<canvas id="cvs-moon"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="eclipse-rim"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="ui">
  <div class="panel p-tl">
    <div class="lbl">◈ 2026·03·03  UTC+8</div>
    <div class="val-xl" id="clock">--:--:--</div>
    <div id="phase-label">STANDBY</div>
    <div style="margin-top:8px;border-top:1px solid var(--glass-border);padding-top:7px">
      <div class="tel-row"><span class="tel-k">MODE</span><span class="tel-v" id="tel-mode">LIVE</span></div>
      <div class="tel-row"><span class="tel-k">SHADOW</span><span class="tel-v" id="tel-shad">—</span></div>
      <div class="tel-row"><span class="tel-k">RED-SHIFT</span><span class="tel-v" id="tel-red">0.0%</span></div>
      <div class="tel-row"><span class="tel-k">BRIGHTNESS</span><span class="tel-v" id="tel-bright">100%</span></div>
    </div>
  </div>
  <div class="panel p-tr">
    <div class="lbl" id="cd-lbl">NEXT EVENT</div>
    <div class="val-md" id="cd-evt" style="margin-bottom:3px">——————</div>
    <div class="val-xl" id="cd-time">--:--:--</div>
    <div style="margin-top:8px;border-top:1px solid var(--glass-border);padding-top:7px">
      <div class="tel-row"><span class="tel-k">PHASE</span><span class="tel-v" id="tel-phase">—</span></div>
      <div class="tel-row"><span class="tel-k">PROGRESS</span><span class="tel-v" id="tel-prog">—</span></div>
      <div class="tel-row"><span class="tel-k">ZOOM</span><span class="tel-v" id="tel-zoom">x1.00</span></div>
    </div>
  </div>
  <div class="panel p-br">
    <div class="sched-title">◈ 月全食日程表</div>
    <div id="sched-list"></div>
  </div>
</div>
<div id="tot-badge">⬡ TOTAL LUNAR ECLIPSE ⬡<br>
  <span style="font-size:9px;letter-spacing:3px;opacity:.75">BLOOD MOON · 血月</span></div>
<div id="tl-wrap">
  <div id="tl-panel">
    <canvas id="tl-cvs"></canvas>
    <div id="demo-row">
      <span class="lbl" style="margin:0;display:flex;align-items:center;padding-right:4px">DEMO:</span>
      <button class="dbtn" id="db0" onclick="demoJump(0)">满月前</button>
      <button class="dbtn" id="db1" onclick="demoJump(1)">半影食始</button>
      <button class="dbtn" id="db2" onclick="demoJump(2)">初亏</button>
      <button class="dbtn" id="db3" onclick="demoJump(3)">食既</button>
      <button class="dbtn" id="db4" onclick="demoJump(4)">食甚</button>
      <button class="dbtn" id="db5" onclick="demoJump(5)">生光</button>
      <button class="dbtn" id="db6" onclick="demoJump(6)">复圆后</button>
      <button class="dbtn live on" id="dbLive" onclick="setLive()">◉ LIVE</button>
    </div>
  </div>
</div>

const hm = (h,m) => h*60+m;
const EVT = [
{id:“p1”, name:“半影食始”, time:hm(16,45), ts:“16:45”, desc:“月球进入地球半影区域”,   cls:””},
{id:“u1”, name:“初亏”,     time:hm(17,49), ts:“17:49”, desc:“月球开始进入地球本影”,   cls:””},
{id:“u2”, name:“食既”,     time:hm(19, 4), ts:“19:04”, desc:“月亮完全进入本影·变红”, cls:“tot”},
{id:“max”,name:“食甚”,     time:hm(19,33), ts:“19:33”, desc:“最暗最红·血月极致”,     cls:“tot”},
{id:“u3”, name:“生光”,     time:hm(20, 2), ts:“20:02”, desc:“开始恢复亮度”,           cls:””},
{id:“u4”, name:“复圆”,     time:hm(21,17), ts:“21:17”, desc:“完全恢复圆盘”,           cls:””},
{id:“p2”, name:“半影食终”, time:hm(22,25), ts:“22:25”, desc:“完全离开半影”,           cls:””},
];
const T_START=hm(16,0), T_END=hm(23,0);

const bgC=document.getElementById(“cvs-bg”),  bgX=bgC.getContext(“2d”);
const moC=document.getElementById(“cvs-moon”),moX=moC.getContext(“2d”);

let W,H,CX,CY;
function resize(){
W=bgC.width=moC.width=window.innerWidth;
H=bgC.height=moC.height=window.innerHeight;
CX=W/2; CY=H/2;
tlC.width=tlC.parentElement.clientWidth-36; tlC.height=72;
initStars();
}
window.addEventListener(“resize”,resize);

function eclipseState(t){
const [P1,U1,U2,MX,U3,U4,P2]=EVT.map(e=>e.time);
if(t<P1)  return{phase:0,pt:0,  name:“满月 · FULL MOON”,       stype:“none”,    bright:1.0,red:0.0,sx:4,soft:.2};
if(t<U1){ const pt=(t-P1)/(U1-P1);
return{phase:1,pt,name:“半影食始 · PENUMBRA”,   stype:“penumbra”,bright:1-pt*.10,red:0,   sx:4,soft:.2+pt*.15};}
if(t<U2){ const pt=(t-U1)/(U2-U1);
return{phase:2,pt,name:“初亏 · PARTIAL ECLIPSE”, stype:“umbra”,  bright:1-pt*.72,red:pt*.18,sx:1.6-pt*2.8,soft:.12};}
if(t<U3){ const pt=(t-U2)/(U3-U2);
const d=t<MX?(t-U2)/(MX-U2):1-(t-MX)/(U3-MX);
return{phase:3,pt,name:“血月 · TOTAL ECLIPSE”,   stype:“total”,  bright:.06+d*.06,red:.9+d*.10,sx:0,soft:0,depthT:d};}
if(t<U4){ const pt=(t-U3)/(U4-U3);
return{phase:4,pt,name:“生光 · PARTIAL EGRESS”,  stype:“umbra”,  bright:.28+pt*.72,red:(1-pt)*.18,sx:-1.2+pt*2.8,soft:.12};}
if(t<P2){ const pt=(t-U4)/(P2-U4);
return{phase:5,pt,name:“复圆 · PENUMBRA EGRESS”, stype:“penumbra”,bright:.90+pt*.10,red:0,sx:4,soft:.2*(1-pt)};}
return{phase:6,pt:1,name:“复圆 · FULL MOON”,        stype:“none”,   bright:1.0,red:0.0,sx:4,soft:.1};
}

let moonRotY=0;

function drawMoon(ctx,cx,cy,r,st){
if(!moonReady) return;
const D=r*2;
ctx.save();

// 1. Clip to disc
ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();

// 2. Draw NASA texture (equirectangular, with slow horizontal scroll = libration)
const iw=moonImg.naturalWidth, ih=moonImg.naturalHeight;
const rotFrac=(((moonRotY/(Math.PI*2))%1)+1)%1;
const xOff=Math.floor(rotFrac*iw);
const w1=iw-xOff, w2=xOff;
ctx.drawImage(moonImg, xOff,0, w1,ih,  cx-r,              cy-r, D*(w1/iw), D);
if(w2>0) ctx.drawImage(moonImg, 0,0, w2,ih, cx-r+D*(w1/iw), cy-r, D*(w2/iw), D);

// 3. Sphere shading: limb darkening via radial gradient
const sg=ctx.createRadialGradient(cx+r*.08,cy-r*.07,r*.05, cx,cy,r);
sg.addColorStop(0.00,“rgba(255,255,255,.03)”);
sg.addColorStop(0.55,“rgba(0,0,0,.04)”);
sg.addColorStop(0.80,“rgba(0,0,0,.32)”);
sg.addColorStop(1.00,“rgba(0,0,0,.78)”);
ctx.globalCompositeOperation=“source-over”;
ctx.fillStyle=sg; ctx.fillRect(cx-r,cy-r,D,D);

// 4. Eclipse shadow / tinting
const UMBRA_R=r*2.7;

if(st.phase===2||st.phase===4){
// Partial eclipse: sweep large umbra disc across moon
const umbraX=cx+st.sx*r;
ctx.save();
ctx.beginPath(); ctx.arc(umbraX,cy,UMBRA_R,0,Math.PI*2); ctx.clip();
ctx.fillStyle=“rgba(2,2,14,.95)”;
ctx.fillRect(cx-r,cy-r,D,D);
ctx.restore();
// Red-orange atmospheric fringe at umbra edge
const fw=r*.20;
const fg=ctx.createRadialGradient(umbraX,cy,UMBRA_R-fw*1.2, umbraX,cy,UMBRA_R+fw*.4);
fg.addColorStop(0,“transparent”);
fg.addColorStop(.45,“rgba(200,65,8,”+st.red*.85+”)”);
fg.addColorStop(1,“transparent”);
ctx.fillStyle=fg;
ctx.beginPath(); ctx.arc(umbraX,cy,UMBRA_R+fw*.4,0,Math.PI*2); ctx.fill();

} else if(st.phase===3){
// Total eclipse: blood moon via multiply + screen blends
const d=st.depthT||.5;
// A: darken with multiply (keeps texture visible)
ctx.globalCompositeOperation=“multiply”;
ctx.fillStyle=“rgba(28,6,2,”+(.68-d*.06)+”)”;
ctx.fillRect(cx-r,cy-r,D,D);
// B: crimson-to-copper radial tint
const rg=ctx.createRadialGradient(cx,cy,0, cx,cy,r);
rg.addColorStop(0.00,“rgba(115,16,2,”+(.80-d*.06)+”)”);
rg.addColorStop(0.50,“rgba(175,38,5,.74)”);
rg.addColorStop(0.80,“rgba(205,62,10,.64)”);
rg.addColorStop(1.00,“rgba(228,88,18,.50)”);
ctx.fillStyle=rg; ctx.fillRect(cx-r,cy-r,D,D);
ctx.globalCompositeOperation=“source-over”;
// C: atmospheric limb glow (screen adds brightness at rim)
const lg=ctx.createRadialGradient(cx,cy,r*.70, cx,cy,r);
lg.addColorStop(0,“transparent”);
lg.addColorStop(1,“rgba(215,75,12,”+(.32+d*.14)+”)”);
ctx.globalCompositeOperation=“screen”;
ctx.fillStyle=lg; ctx.fillRect(cx-r,cy-r,D,D);
ctx.globalCompositeOperation=“source-over”;

} else if(st.phase===1||st.phase===5){
// Penumbra: very subtle one-sided dimming
const side=st.phase===1?1:-1;
const pg=ctx.createRadialGradient(cx+side*r*.6,cy,0, cx+side*r*.5,cy,r*2.2);
pg.addColorStop(0,“rgba(0,0,10,”+st.pt*.09+”)”);
pg.addColorStop(1,“transparent”);
ctx.fillStyle=pg; ctx.fillRect(cx-r,cy-r,D,D);
}

// 5. Atmospheric limb glow ring (outermost)
const limb=ctx.createRadialGradient(cx,cy,r*.88, cx,cy,r);
if(st.phase===3){
const d=st.depthT||.5;
limb.addColorStop(0,“transparent”);
limb.addColorStop(1,“rgba(195,52,6,”+(.48+d*.16)+”)”);
} else {
limb.addColorStop(0,“transparent”);
limb.addColorStop(1,“rgba(155,182,255,”+(.22*st.bright)+”)”);
}
ctx.globalCompositeOperation=“source-over”;
ctx.fillStyle=limb; ctx.fillRect(cx-r,cy-r,D,D);
ctx.restore();
}

function drawGlow(ctx,cx,cy,r,st){
const gr=r*(st.phase===3?1.32:1.26);
const g=ctx.createRadialGradient(cx,cy,r*.80, cx,cy,gr);
if(st.phase===3){
const d=st.depthT||.5;
g.addColorStop(0,“rgba(185,28,2,”+(.42+d*.16)+”)”);
g.addColorStop(.6,“rgba(100,10,0,.06)”);
g.addColorStop(1,“transparent”);
} else {
g.addColorStop(0,“rgba(165,200,255,”+(.22*st.bright)+”)”);
g.addColorStop(1,“transparent”);
}
ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,gr,0,Math.PI*2); ctx.fill();
}

let stars=[];
function initStars(){
stars=[];
const n=(W*H/900)|0;
for(let i=0;i<n;i++) stars.push({
x:Math.random()*W,y:Math.random()*H,
r:Math.random()*1.3+.15,a:Math.random()*.7+.25,
tw:Math.random()*Math.PI*2,ts:(Math.random()*.4+.2)*.018,
hue:Math.random()>.88?(200+Math.random()*40|0):Math.random()>.85?(25+Math.random()*15|0):null
});
}
function drawStars(tot){
for(const s of stars){
s.tw+=s.ts;
const a=s.a*(.62+.38*Math.sin(s.tw))*(tot?1.38:1);
bgX.save(); bgX.globalAlpha=Math.min(1,a);
bgX.fillStyle=s.hue?(“hsl(”+s.hue+”,72%,92%)”):”#fff”;
bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2); bgX.fill(); bgX.restore();
}
}

const PARTS=Array.from({length:50},()=>({
x:Math.random(),y:Math.random(),
vx:(Math.random()-.5)*.00025,vy:(Math.random()-.5)*.00025,
r:Math.random()*1.2+.2,a:Math.random()*.22+.05,
tw:Math.random()*Math.PI*2,ts:(Math.random()*.3+.1)*.012
}));
function drawParticles(red){
for(const p of PARTS){
p.x+=p.vx; p.y+=p.vy; p.tw+=p.ts;
if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
const a=p.a*(.6+.4*Math.sin(p.tw));
bgX.save(); bgX.globalAlpha=a;
bgX.fillStyle=red?“rgba(255,70,20,.9)”:“rgba(0,210,255,.9)”;
bgX.beginPath(); bgX.arc(p.x*W,p.y*H,p.r,0,Math.PI*2); bgX.fill(); bgX.restore();
}
}

function drawShadowDiagram(a){
if(a<.01) return;
bgX.save(); bgX.globalAlpha=a*.32;
const ex=W*.05,ey=CY,er=Math.min(W,H)*.07,cl=W*.65;
const pg=bgX.createLinearGradient(ex,ey,ex+cl,ey);
pg.addColorStop(0,“rgba(20,25,70,.7)”); pg.addColorStop(1,“transparent”);
bgX.beginPath(); bgX.moveTo(ex,ey-er*1.9); bgX.lineTo(ex+cl,ey-er*.25);
bgX.lineTo(ex+cl,ey+er*.25); bgX.lineTo(ex,ey+er*1.9);
bgX.closePath(); bgX.fillStyle=pg; bgX.fill();
const ug=bgX.createLinearGradient(ex,ey,ex+cl*.8,ey);
ug.addColorStop(0,“rgba(2,2,20,.92)”); ug.addColorStop(1,“transparent”);
bgX.beginPath(); bgX.moveTo(ex,ey-er*.88); bgX.lineTo(ex+cl*.78,ey-2);
bgX.lineTo(ex+cl*.78,ey+2); bgX.lineTo(ex,ey+er*.88);
bgX.closePath(); bgX.fillStyle=ug; bgX.fill();
bgX.restore();
}

const CAM={zoom:1.0,target:1.0,MAX:3.0,MIN:1.0};

let liveMode=true,demoMins=hm(16,30),targetMin=hm(16,30);
const DEMO_T=[hm(16,30),hm(17,5),hm(18,20),hm(19,10),hm(19,33),hm(20,10),hm(21,40)];
function getNow(){
if(liveMode){const n=new Date();return n.getHours()*60+n.getMinutes()+n.getSeconds()/60+n.getMilliseconds()/60000;}
return demoMins;
}
function demoJump(i){liveMode=false;targetMin=DEMO_T[i];setBtns(i);}
function setLive(){liveMode=true;setBtns(-1);}
function setBtns(a){
for(let i=0;i<7;i++)document.getElementById(“db”+i).classList.toggle(“on”,i===a);
document.getElementById(“dbLive”).classList.toggle(“on”,liveMode);
}

function drawTimeline(now){
const tw=tlC.width,th=tlC.height;
tlX.clearRect(0,0,tw,th);
const PAD=16,BY=34,BH=11,bw=tw-PAD*2;
const tx=t=>PAD+(t-T_START)/(T_END-T_START)*bw;
tlX.fillStyle=“rgba(0,243,255,.06)”;
tlX.beginPath();tlX.roundRect(PAD,BY,bw,BH,3);tlX.fill();
const bands=[
[T_START,    EVT[0].time,“rgba(150,185,255,.13)”],[EVT[0].time,EVT[1].time,“rgba(80,160,255,.19)”],
[EVT[1].time,EVT[2].time,“rgba(255,145,45,.28)”],[EVT[2].time,EVT[4].time,“rgba(205,25,5,.52)”],
[EVT[4].time,EVT[5].time,“rgba(255,145,45,.28)”],[EVT[5].time,EVT[6].time,“rgba(80,160,255,.19)”],
[EVT[6].time,T_END,      “rgba(150,185,255,.13)”],
];
for(const [s,e,c] of bands){tlX.fillStyle=c;tlX.fillRect(tx(s),BY,tx(e)-tx(s),BH);}
if(now>T_START){
const end=Math.min(now,T_END),tot2=now>EVT[2].time&&now<EVT[4].time;
tlX.save();tlX.globalAlpha=.22;tlX.fillStyle=tot2?”#ff4010”:”#00f3ff”;
tlX.fillRect(PAD,BY,tx(end)-PAD,BH);tlX.restore();
}
for(let i=0;i<EVT.length;i++){
const ev=EVT[i],ex=tx(ev.time);
const past=ev.time<now,cur=ev.time<=now&&(i===EVT.length-1||EVT[i+1].time>now);
const isTot=ev.cls===“tot”;
const col=cur?(isTot?”#ff5520”:”#ffb830”):past?“rgba(0,243,255,.35)”:“rgba(0,243,255,.2)”;
tlX.strokeStyle=col;tlX.lineWidth=cur?2:1;
tlX.beginPath();tlX.moveTo(ex,BY-3);tlX.lineTo(ex,BY+BH+3);tlX.stroke();
tlX.save();tlX.translate(ex,BY-8);tlX.rotate(Math.PI/4);
if(cur){tlX.shadowColor=isTot?”#ff4010”:”#ffb830”;tlX.shadowBlur=8;}
const ds=cur?5:3;tlX.fillStyle=col;tlX.fillRect(-ds/2,-ds/2,ds,ds);tlX.restore();
tlX.save();tlX.font=“8px Share Tech Mono,monospace”;
tlX.fillStyle=cur?“rgba(255,255,255,.55)”:“rgba(0,243,255,.18)”;
tlX.textAlign=“center”;tlX.fillText(ev.ts,ex,BY-13);tlX.restore();
tlX.save();tlX.font=(cur?“bold “:””)+“8.5px Orbitron,monospace”;
if(cur){tlX.shadowColor=isTot?”#ff4010”:”#ffb830”;tlX.shadowBlur=5;}
tlX.fillStyle=col;tlX.textAlign=“center”;tlX.fillText(ev.name,ex,BY+BH+14);tlX.restore();
}
if(now>=T_START&&now<=T_END){
const cx=tx(now),isTotNow=now>=EVT[2].time&&now<EVT[4].time,cc=isTotNow?”#ff4010”:”#00f3ff”;
tlX.save();tlX.strokeStyle=cc;tlX.lineWidth=1.5;tlX.shadowColor=cc;tlX.shadowBlur=10;
tlX.setLineDash([3,3]);tlX.beginPath();tlX.moveTo(cx,2);tlX.lineTo(cx,BY+BH+3);tlX.stroke();
tlX.setLineDash([]);tlX.restore();
tlX.save();tlX.fillStyle=cc;tlX.shadowColor=cc;tlX.shadowBlur=12;
tlX.beginPath();tlX.moveTo(cx,BY+BH*.5);tlX.lineTo(cx-5.5,BY-5);tlX.lineTo(cx+5.5,BY-5);
tlX.closePath();tlX.fill();tlX.restore();
const h2=Math.floor(now/60),m2=Math.floor(now%60),s2=Math.floor((now%1)*60);
const lbl=String(h2).padStart(2,“0”)+”:”+String(m2).padStart(2,“0”)+”:”+String(s2).padStart(2,“0”);
const lx=Math.max(28,Math.min(tw-28,cx));
tlX.save();tlX.font=“bold 9px Orbitron,monospace”;tlX.fillStyle=cc;tlX.shadowColor=cc;
tlX.shadowBlur=8;tlX.textAlign=“center”;tlX.fillText(lbl,lx,11);tlX.restore();
}
}

const pz=n=>String(Math.floor(n)).padStart(2,“0”);
function fmtCD(s){s=Math.max(0,s|0);return pz(s/3600)+”:”+pz((s%3600)/60)+”:”+pz(s%60);}
function updateHUD(st,now){
let ck;
if(liveMode){const n=new Date();ck=pz(n.getHours())+”:”+pz(n.getMinutes())+”:”+pz(n.getSeconds());}
else{ck=pz(now/60)+”:”+pz(now%60)+”:”+pz((now%1)*60);}
document.getElementById(“clock”).textContent=ck;
const pl=document.getElementById(“phase-label”);
pl.textContent=st.name;
pl.style.color=st.phase===3?”#ff4020”:”#ffb830”;
pl.style.textShadow=st.phase===3?“0 0 12px rgba(255,64,32,.9)”:“0 0 10px rgba(255,184,48,.7)”;
const me=document.getElementById(“tel-mode”);
me.textContent=liveMode?“LIVE”:“DEMO”;me.style.color=liveMode?“var(–cyan)”:”#ffb830”;
document.getElementById(“tel-shad”).textContent={none:“无阴影”,penumbra:“半影”,umbra:“本影”,total:“完全本影”}[st.stype]||”—”;
document.getElementById(“tel-red”).textContent=(st.red*100).toFixed(1)+”%”;
document.getElementById(“tel-bright”).textContent=(st.bright*100).toFixed(1)+”%”;
document.getElementById(“tel-phase”).textContent=[“满月”,“半影”,“偏食”,“全食”,“生光”,“复原”,“结束”][st.phase]||”—”;
document.getElementById(“tel-prog”).textContent=(st.pt*100).toFixed(1)+”%”;
document.getElementById(“tel-zoom”).textContent=“x”+CAM.zoom.toFixed(2);
const next=EVT.find(e=>e.time>now);
if(next){
document.getElementById(“cd-lbl”).textContent=“▶ 距离”;
document.getElementById(“cd-evt”).textContent=next.name;
document.getElementById(“cd-time”).textContent=fmtCD((next.time-now)*60);
} else {
document.getElementById(“cd-lbl”).textContent=“▶ 今日月全食”;
document.getElementById(“cd-evt”).textContent=“已完全结束”;
document.getElementById(“cd-time”).textContent=”——:——:——”;
}
EVT.forEach(function(ev,i){
const el=document.getElementById(“si-”+ev.id);if(!el)return;
el.className=“si “+ev.cls;
const cur=ev.time<=now&&(i===EVT.length-1||EVT[i+1].time>now);
if(cur)el.classList.add(“active”);else if(ev.time<now)el.classList.add(“past”);
});
const tot=st.phase===3;
document.getElementById(“tot-badge”).className=tot?“show”:””;
document.getElementById(“eclipse-rim”).style.opacity=tot?“1”:“0”;
}

(function buildSchedule(){
const el=document.getElementById(“sched-list”);
EVT.forEach(function(ev){
const d=document.createElement(“div”);d.className=“si “+ev.cls;d.id=“si-”+ev.id;
d.innerHTML=”<span class="s-n">”+ev.name+”</span><span class="s-t">”+ev.ts+”</span><span class="s-d">”+ev.desc+”</span>”;
el.appendChild(d);
});
})();

let lastTs=0;
function render(ts){
requestAnimationFrame(render);
const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
if(!liveMode)demoMins+=(targetMin-demoMins)*Math.min(1,3*dt);
const now=getNow(),st=eclipseState(now);
moonRotY+=0.00015*dt*60;
CAM.target=st.phase===3?CAM.MAX:CAM.MIN;
CAM.zoom+=(CAM.target-CAM.zoom)*Math.min(1,.018*60*dt);
bgX.clearRect(0,0,W,H);bgX.fillStyle=”#03030e”;bgX.fillRect(0,0,W,H);
drawStars(st.phase===3);
drawParticles(st.phase===3);
drawShadowDiagram(Math.min(1,Math.max(0,(1.8-CAM.zoom)/.8)));
moX.clearRect(0,0,W,H);
const baseR=Math.min(W,H)*.12,moonR=baseR*CAM.zoom;
const zf=Math.min(1,Math.max(0,(CAM.zoom-1)/(CAM.MAX-1)));
const ease=zf*zf*(3-2*zf);
const moonX=CX+W*.10*(1-ease),moonY=CY+H*(-.04)*(1-ease);
drawGlow(moX,moonX,moonY,moonR,st);
drawMoon(moX,moonX,moonY,moonR,st);
drawTimeline(now);
updateHUD(st,now);
}

resize();
window.addEventListener(“load”,function(){
const n=new Date();
const onDay=(n.getFullYear()===2026&&n.getMonth()===2&&n.getDate()===3);
const nm=n.getHours()*60+n.getMinutes();
if(!onDay||nm<T_START||nm>T_END)setTimeout(function(){demoJump(4);},300);
else setBtns(-1);
});
requestAnimationFrame(render);

</script>
</body>
</html>
